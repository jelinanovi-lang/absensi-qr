<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .hidden { display: none; }
        #reader { width: 100%; border-radius: 15px; }
    </style>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-primary mb-4"><div class="container"><span class="navbar-brand">E-Absensi</span></div></nav>

<div class="container">
    <div id="loginPage" class="card p-4 mx-auto" style="max-width: 400px;">
        <h4 class="text-center mb-3">Login</h4>
        <input type="text" id="email" class="form-control mb-2" placeholder="Email / NISN">
        <select id="role" class="form-select mb-3">
            <option value="Siswa">Siswa</option>
            <option value="Guru Kelas">Guru Kelas</option>
            <option value="Guru Mapel">Guru Mapel</option>
        </select>
        <button class="btn btn-primary w-100" onclick="login()">Masuk</button>
    </div>

    <div id="guruPage" class="hidden">
        <div class="row">
            <div class="col-md-5 mb-3"><div class="card p-3"><h5>Scanner</h5><div id="reader"></div></div></div>
            <div class="col-md-7"><div class="card p-3"><h5>Rekap Kehadiran</h5>
                <div class="table-responsive"><table class="table small"><thead><tr><th>Tgl</th><th>Nama</th><th>Kelas</th></tr></thead><tbody id="rekapBody"></tbody></table></div>
            </div></div>
        </div>
    </div>

    <div id="siswaPage" class="hidden card p-4">
        <h4>Riwayat Absensi: <span id="namaSiswa"></span></h4>
        <div class="table-responsive"><table class="table"><thead><tr><th>Waktu</th><th>Status</th><th>Guru</th></tr></thead><tbody id="historyBody"></tbody></table></div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwQhahhByQok1pmTYLlYOx-Ojre_3KDn4kL4BITKC7vJq-nElGin_3r64c6aRR6b1kA/exec";
    let user = {};

    function login() {
        const email = document.getElementById('email').value;
        const role = document.getElementById('role').value;
        Swal.fire('Loading...');
        
        if(role === 'Siswa') {
            loadSiswa(email);
        } else {
            fetch(`${API_URL}?action=getProfile&email=${email}&role=${role}`)
                .then(r => r.json()).then(res => {
                    if(res.status === 'success') {
                        user = res.user;
                        showPage('guruPage');
                        loadRekap();
                        startScanner();
                        Swal.close();
                    } else { Swal.fire('Error', 'User tidak ditemukan', 'error'); }
                });
        }
    }

    function startScanner() {
        const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        scanner.render(onScanSuccess);
    }

    function onScanSuccess(decodedText) {
        fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'scanAttendance', nisn: decodedText, guru: user.Nama })
        }).then(() => { Swal.fire('Berhasil', 'Data tercatat', 'success'); loadRekap(); });
    }

    function loadRekap() {
        fetch(`${API_URL}?action=getRecap&email=${user.Email}&role=${user.Role}`)
            .then(r => r.json()).then(data => {
                document.getElementById('rekapBody').innerHTML = data.map(r => `<tr><td>${new Date(r[0]).toLocaleDateString()}</td><td>${r[2]}</td><td>${r[3]}</td></tr>`).join('');
            });
    }

    function loadSiswa(nisn) {
        fetch(`${API_URL}?action=getHistory&nisn=${nisn}`)
            .then(r => r.json()).then(data => {
                showPage('siswaPage');
                document.getElementById('namaSiswa').innerText = nisn;
                document.getElementById('historyBody').innerHTML = data.map(r => `<tr><td>${new Date(r[0]).toLocaleString()}</td><td>${r[4]}</td><td>${r[5]}</td></tr>`).join('');
                Swal.close();
            });
    }

    function showPage(id) {
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
    }
</script>
</body>
</html>
